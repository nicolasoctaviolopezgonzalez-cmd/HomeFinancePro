name: home_finance_pro
description: "Aplicación profesional de gestión de finanzas personales con análisis, presupuestos y metas."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.19.0
  fl_chart: ^0.63.0
  uuid: ^4.0.0
  shared_preferences: ^2.2.2
  get_it: ^7.6.0
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  equatable: ^2.0.5
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  dio: ^5.3.1
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_analytics: ^10.7.0
  device_info_plus: ^9.1.1
  share_plus: ^7.2.1
  pdf: ^3.10.4
  printing: ^5.11.0
  charts_flutter: ^0.12.0
  dotted_border: ^2.1.0
  animations: ^2.0.8
  connectivity_plus: ^5.0.2
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^3.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
